services:
  whatsapp:
    image: ghcr.io/aldinokemal/go-whatsapp-web-multidevice:latest
    container_name: whatsapp
    restart: always
    ports: []
    volumes:
      - whatsapp:/app/storages
    command:
      - rest
      - --port=3000
      - --debug=false
      - --os=Chrome
      - --account-validation=false
      # optionally enable basic auth (recommended for production):
      - --basic-auth=dwirez:dwirez123
    networks:
      - app-network
  # OpenAPI / Swagger UI - serves the project's OpenAPI spec at docs/openapi.yaml
  openapi:
    image: swaggerapi/swagger-ui:latest
    container_name: openapi
    restart: unless-stopped
    ports: []
    environment:
      # Point swagger-ui to the mounted spec
      - SWAGGER_JSON=/spec/openapi.yaml
    volumes:
      # Mount the docs directory read-only so the UI can load the spec
      - ./docs:/spec:ro
    networks:
      - app-network
  # Nginx reverse proxy - routes requests to whatsapp app or openapi service
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - whatsapp
      - openapi
volumes:
  whatsapp:

networks:
  app-network:
    driver: bridge